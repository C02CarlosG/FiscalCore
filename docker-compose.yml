services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: fiscalcore2024
      POSTGRES_DB: auditoria_fiscal
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./001_schema_inicial.sql:/docker-entrypoint-initdb.d/001_schema_inicial.sql:ro
      - ./002_usuarios.sql:/docker-entrypoint-initdb.d/002_usuarios.sql:ro
      - ./003_acciones.sql:/docker-entrypoint-initdb.d/003_acciones.sql:ro
      - ./004_pagos_cfdi.sql:/docker-entrypoint-initdb.d/004_pagos_cfdi.sql:ro
      - ./005_cfdi40_campos.sql:/docker-entrypoint-initdb.d/005_cfdi40_campos.sql:ro
      - ./006_match_multiple.sql:/docker-entrypoint-initdb.d/006_match_multiple.sql:ro
      - ./007_match_heuristico.sql:/docker-entrypoint-initdb.d/007_match_heuristico.sql:ro
      - ./008_confianza_conciliacion.sql:/docker-entrypoint-initdb.d/008_confianza_conciliacion.sql:ro
      - ./009_ppd_estados.sql:/docker-entrypoint-initdb.d/009_ppd_estados.sql:ro
      - ./010_complemento_tipos.sql:/docker-entrypoint-initdb.d/010_complemento_tipos.sql:ro

volumes:
  pg_data:
