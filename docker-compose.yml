services:
  db:
    image: postgres:15
    container_name: fiscalcore_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fiscalcore
    ports:
      - "5432:5432"
    volumes:
      - fiscalcore_data:/var/lib/postgresql/data

volumes:
  fiscalcore_data:
